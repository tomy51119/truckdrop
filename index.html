<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruckDrop — Trouvez un food truck près de vous</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #F97316;
      --orange-light: #FFF7ED;
      --orange-dark: #EA6C0A;
      --dark: #111827;
      --gray-900: #1F2937;
      --gray-700: #374151;
      --gray-500: #6B7280;
      --gray-300: #D1D5DB;
      --gray-100: #F9FAFB;
      --white: #FFFFFF;
      --green: #16A34A;
      --green-light: #F0FDF4;
      --red: #DC2626;
      --radius: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-100);
      color: var(--dark);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--gray-300);
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 700; text-decoration: none; color: var(--dark); }
    .logo-icon { width: 34px; height: 34px; background: var(--orange); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { font-size: 14px; color: var(--gray-500); text-decoration: none; padding: 6px 12px; border-radius: 8px; }
    .nav-link:hover { background: var(--gray-100); color: var(--dark); }
    .btn-nav { background: var(--orange); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn-nav:hover { background: var(--orange-dark); }

    /* HERO */
    .hero {
      background: var(--white);
      border-bottom: 1px solid var(--gray-300);
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
    }
    .hero h1 {
      font-size: 36px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
      line-height: 1.2;
    }
    .hero h1 span { color: var(--orange); }
    .hero p { font-size: 17px; color: var(--gray-500); margin-bottom: 1.75rem; }

    /* SEARCH BAR */
    .search-wrap {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .search-input-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-input-wrap input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .search-input-wrap input:focus { border-color: var(--orange); }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
    }
    .btn-locate {
      display: flex; align-items: center; gap: 6px;
      padding: 12px 16px;
      background: var(--white);
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--gray-700);
      white-space: nowrap;
      font-family: inherit;
    }
    .btn-locate:hover { border-color: var(--orange); color: var(--orange); }
    .btn-search {
      padding: 12px 20px;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-search:hover { background: var(--orange-dark); }

    /* FILTERS */
    .filters-wrap {
      background: var(--white);
      border-bottom: 1px solid var(--gray-300);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters-wrap::-webkit-scrollbar { display: none; }
    .filter-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px;
      border: 1.5px solid var(--gray-300);
      border-radius: 20px;
      font-size: 13px;
      color: var(--gray-700);
      background: var(--white);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
      font-family: inherit;
    }
    .filter-chip:hover { border-color: var(--orange); }
    .filter-chip.active { background: var(--orange-light); border-color: var(--orange); color: var(--orange); font-weight: 500; }

    /* MAIN LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 560px;
      max-height: 65vh;
    }

    /* LISTE */
    .list-panel {
      background: var(--white);
      border-right: 1px solid var(--gray-300);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .list-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .list-count { font-size: 13px; color: var(--gray-500); }
    .list-sort { font-size: 13px; color: var(--gray-500); border: none; background: none; cursor: pointer; font-family: inherit; }

    /* RADIUS SLIDER */
    .radius-bar {
      padding: 10px 1.25rem;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .radius-bar label { font-size: 12px; color: var(--gray-500); white-space: nowrap; }
    .radius-bar input { flex: 1; }
    .radius-bar span { font-size: 12px; font-weight: 500; min-width: 36px; text-align: right; }

    /* TRUCK CARDS */
    .truck-list { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .truck-card {
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--white);
    }
    .truck-card:hover { border-color: var(--orange); }
    .truck-card.selected { border-color: var(--orange); background: var(--orange-light); }
    .truck-card.pro-card { border-color: #A78BFA; }
    .truck-card.pro-card:hover { border-color: #7C3AED; }
    .truck-emoji { font-size: 28px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--gray-100); border-radius: 10px; flex-shrink: 0; }
    .truck-info { flex: 1; min-width: 0; }
    .truck-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 3px; }
    .truck-name { font-size: 14px; font-weight: 600; color: var(--dark); }
    .truck-cuisine { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
    .truck-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .meta-item { font-size: 11px; color: var(--gray-500); display: flex; align-items: center; gap: 3px; }

    /* AD CARD (sponsorisé) */
    .ad-card {
      border: 1.5px solid #DDD6FE;
      background: linear-gradient(135deg, #FAF5FF, #F5F3FF);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ad-card:hover { border-color: #A78BFA; }
    .ad-icon { font-size: 24px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: #EDE9FE; border-radius: 10px; flex-shrink: 0; }
    .ad-info { flex: 1; min-width: 0; }
    .ad-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 3px; }
    .ad-name { font-size: 14px; font-weight: 600; color: var(--dark); }
    .ad-sponsored-badge { font-size: 9px; font-weight: 700; color: #7C3AED; background: #EDE9FE; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
    .ad-desc { font-size: 12px; color: var(--gray-700); margin-bottom: 4px; line-height: 1.4; }
    .ad-cta { font-size: 12px; color: #7C3AED; font-weight: 600; }

    .badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; white-space: nowrap; }
    .badge-open { background: var(--green-light); color: var(--green); }
    .badge-closed { background: var(--gray-100); color: var(--gray-500); }
    .badge-pro { background: #EDE9FE; color: #6D28D9; }
    .stars { color: #F59E0B; font-size: 11px; }

    /* EMPTY STATE */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center; color: var(--gray-500);
    }
    .empty-state .big { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* LOADING */
    .loading {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--gray-500); font-size: 14px; gap: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--gray-300); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }

    /* MAP */
    .map-panel { position: relative; }
    #map { width: 100%; height: 100%; z-index: 1; }

    /* EVENT BANNER */
    .event-banner {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: var(--dark);
      color: white;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .event-banner:hover { background: var(--gray-900); }
    .event-banner span { background: var(--orange); padding: 3px 10px; border-radius: 20px; font-size: 13px; }

    /* POPUP DÉTAIL TRUCK */
    .truck-popup {
      position: absolute;
      top: 1rem; right: 1rem;
      z-index: 500;
      background: var(--white);
      border-radius: 14px;
      border: 1px solid var(--gray-300);
      padding: 1.25rem;
      width: 280px;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .truck-popup.show { display: block; }
    .popup-close { position: absolute; top: 10px; right: 12px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--gray-500); }
    .popup-emoji { font-size: 36px; margin-bottom: 8px; }
    .popup-name { font-size: 17px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
    .popup-cuisine { font-size: 13px; color: var(--gray-500); margin-bottom: 10px; }
    .popup-desc { font-size: 13px; color: var(--gray-700); line-height: 1.5; margin-bottom: 12px; }
    .popup-meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .popup-meta-row { font-size: 12px; color: var(--gray-500); display: flex; align-items: center; gap: 6px; }
    .btn-event {
      width: 100%; padding: 10px;
      background: var(--orange); color: white;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-event:hover { background: var(--orange-dark); }

    /* MOBILE */
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; height: auto; }
      .list-panel { max-height: 50vh; }
      .map-panel { height: 50vh; position: relative; }
      .hero h1 { font-size: 26px; }
      .truck-popup { width: calc(100% - 2rem); right: 1rem; left: 1rem; }
      .hero { padding: 1.5rem 1rem; }
    }

    /* LEAFLET CUSTOM */
    .custom-marker {
      background: var(--orange);
      border: 2px solid white;
      border-radius: 50%;
      width: 32px !important;
      height: 32px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .custom-marker.pro {
      background: #7C3AED;
      width: 36px !important;
      height: 36px !important;
    }
    .custom-marker.closed { opacity: 0.5; }
    .ad-marker {
      background: linear-gradient(135deg, #A78BFA, #7C3AED);
      border: 2px solid white;
      border-radius: 8px;
      width: 30px !important;
      height: 30px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(124,58,237,0.4);
    }
    .user-marker-wrap {
      width: 22px !important;
      height: 22px !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .user-marker-pulse {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(59,130,246,0.3);
      animation: user-pulse 2s ease-out infinite;
    }
    .user-marker-dot {
      position: relative;
      width: 14px;
      height: 14px;
      background: #3B82F6;
      border: 2.5px solid white;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    @keyframes user-pulse {
      0% { transform: scale(0.6); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="logo" href="#">
    <div class="logo-icon">🚚</div>
    TruckDrop
  </a>
  <div class="nav-right">
    <a class="nav-link" href="fidelite.html">🏆 Ma fidélité</a>
    <a class="nav-link" href="connexion.html">Connexion</a>
    <a class="nav-link" href="inscription-client.html">Créer un compte</a>
    <a class="btn-nav" href="inscription.html">🚚 Inscrire mon truck</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Les meilleurs food trucks<br><span>près de chez vous</span></h1>
  <p>Trouvez, explorez et réservez pour vos événements privés</p>
  <div class="search-wrap">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Ville, quartier…" onkeydown="if(event.key==='Enter') searchCity()">
    </div>
    <button class="btn-locate" onclick="locateUser()">📍 Ma position</button>
    <button class="btn-search" onclick="searchCity()">Rechercher</button>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-wrap">
  <button class="filter-chip active" data-cat="all" onclick="setFilter(this)">🍽️ Tous</button>
  <button class="filter-chip" data-cat="burger" onclick="setFilter(this)">🍔 Burgers</button>
  <button class="filter-chip" data-cat="tacos" onclick="setFilter(this)">🌮 Tacos</button>
  <button class="filter-chip" data-cat="asian" onclick="setFilter(this)">🍜 Asiatique</button>
  <button class="filter-chip" data-cat="pizza" onclick="setFilter(this)">🍕 Pizza</button>
  <button class="filter-chip" data-cat="vege" onclick="setFilter(this)">🌱 Végé</button>
  <button class="filter-chip" data-cat="sweet" onclick="setFilter(this)">🧇 Sucré</button>
  <button class="filter-chip" data-cat="bbq" onclick="setFilter(this)">🔥 BBQ</button>
  <button class="filter-chip open-only" onclick="toggleOpen(this)">✅ Ouverts uniquement</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LISTE -->
  <div class="list-panel">
    <div class="list-header">
      <span class="list-count" id="list-count">Chargement…</span>
    </div>
    <div class="radius-bar">
      <label>Rayon</label>
      <input type="range" id="radius-slider" min="1" max="20" step="1" value="5" oninput="updateRadius(this.value)">
      <span id="radius-label">5 km</span>
    </div>
    <div class="truck-list" id="truck-list">
      <div class="loading"><div class="spinner"></div> Recherche en cours…</div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-panel">
    <div id="map"></div>

    <!-- POPUP DÉTAIL -->
    <div class="truck-popup" id="truck-popup">
      <button class="popup-close" onclick="closePopup()">✕</button>
      <div class="popup-emoji" id="popup-emoji">🍔</div>
      <div class="popup-name" id="popup-name">—</div>
      <div class="popup-cuisine" id="popup-cuisine">—</div>
      <div class="popup-desc" id="popup-desc"></div>
      <div class="popup-meta">
        <div class="popup-meta-row" id="popup-dist"></div>
        <div class="popup-meta-row" id="popup-city"></div>
        <div class="popup-meta-row" id="popup-hours"></div>
      </div>
      <button class="btn-event" id="popup-event-btn">📋 Demander un devis événement</button>
    </div>

    <!-- BANNIÈRE ÉVÉNEMENT -->
    <div class="event-banner" onclick="window.location.href='evenement.html'">
      🎉 Vous organisez un événement ?
      <span>Trouver un truck →</span>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://ooshjxostygdljkfhhwb.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_K80E3dBUm7s5m9No3zLQZw_fknMCUfv';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CUISINE_EMOJI = {
    burger:'🍔', tacos:'🌮', asian:'🍜', pizza:'🍕',
    vege:'🌱', sweet:'🧇', bbq:'🔥', other:'🍽️'
  };

  const BUSINESS_EMOJI = {
    bar:'🍺', restaurant:'🍽️', sport:'💪', shop:'🛍️', service:'🔧', other:'📣'
  };

  let map, userMarker, radiusCircle;
  let allTrucks = [];
  let allAds = [];
  let adMarkers = {};
  let markers = {};
  let activeFilter = 'all';
  let showOpenOnly = false;
  let radius = 5;
  let userLat = null, userLng = null;
  let selectedTruck = null;

  // ============================================
  // INIT MAP
  // ============================================
  function initMap(lat, lng) {
    if (map) { map.setView([lat, lng], 13); return; }
    map = L.map('map', { zoomControl: true }).setView([lat, lng], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);
  }

  function setUserPosition(lat, lng) {
    userLat = lat; userLng = lng;
    initMap(lat, lng);

    if (userMarker) userMarker.remove();
    const userIcon = L.divIcon({
      className: 'user-marker-wrap',
      html: '<div class="user-marker-pulse"></div><div class="user-marker-dot"></div>',
      iconSize: [22, 22],
      iconAnchor: [11, 11]
    });
    userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map);

    if (radiusCircle) radiusCircle.remove();
    radiusCircle = L.circle([lat, lng], {
      radius: radius * 1000,
      color: '#F97316', fillColor: '#F97316',
      fillOpacity: 0.05, weight: 1.5, dashArray: '5,5'
    }).addTo(map);

    loadTrucks();
  }

  // ============================================
  // GÉOLOCALISATION
  // ============================================
  function locateUser() {
    if (!navigator.geolocation) { alert('Géolocalisation non disponible.'); return; }
    navigator.geolocation.getCurrentPosition(
      pos => setUserPosition(pos.coords.latitude, pos.coords.longitude),
      () => {
        // Fallback Paris
        setUserPosition(48.8566, 2.3522);
        document.getElementById('search-input').value = 'Paris (position simulée)';
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }

  // ============================================
  // RECHERCHE PAR VILLE (Nominatim OpenStreetMap)
  // ============================================
  async function searchCity() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) { locateUser(); return; }
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
      const data = await res.json();
      if (data.length) {
        setUserPosition(parseFloat(data[0].lat), parseFloat(data[0].lon));
      } else {
        alert('Ville non trouvée. Essayez avec un nom différent.');
      }
    } catch { alert('Erreur de recherche. Vérifiez votre connexion.'); }
  }

  // ============================================
  // CHARGEMENT TRUCKS DEPUIS SUPABASE
  // ============================================
  async function loadTrucks() {
    document.getElementById('truck-list').innerHTML = '<div class="loading"><div class="spinner"></div> Recherche en cours…</div>';
    document.getElementById('list-count').textContent = 'Chargement…';

    try {
      let query;
      if (userLat && userLng) {
        // Recherche géographique via fonction Supabase
        const { data, error } = await sb.rpc('trucks_nearby', {
          lat: userLat, lng: userLng, radius_km: radius
        });
        if (error) throw error;
        allTrucks = data || [];
      } else {
        // Sans position : charger tous les trucks
        const { data, error } = await sb.from('food_trucks').select('*').limit(50);
        if (error) throw error;
        allTrucks = data || [];
      }

      // Calculer distance si position connue
      if (userLat && userLng) {
        allTrucks = allTrucks.map(t => ({
          ...t,
          dist: t.location ? haversine(userLat, userLng, getLat(t.location), getLng(t.location)) : null
        }));
        allTrucks.sort((a, b) => (a.dist || 99999) - (b.dist || 99999));
      }

      // Ajouter points fidélité si connecté
      trackProfileViews();

      // Charger les annonces publicitaires (générales + locales selon position)
      await loadAds();

      renderList();
      renderMarkers();

    } catch (err) {
      console.error(err);
      document.getElementById('truck-list').innerHTML = '<div class="empty-state"><div class="big">⚠️</div><p>Erreur de chargement.<br>Vérifiez votre connexion.</p></div>';
    }
  }

  // ============================================
  // CHARGEMENT DES ANNONCES PUBLICITAIRES
  // ============================================
  async function loadAds() {
    try {
      if (userLat && userLng) {
        const { data, error } = await sb.rpc('ads_nearby', { lat: userLat, lng: userLng });
        if (error) throw error;
        allAds = data || [];
      } else {
        const { data, error } = await sb.from('ads').select('*').eq('status', 'active').eq('ad_type', 'general');
        if (error) throw error;
        allAds = data || [];
      }
    } catch (err) {
      console.error('Erreur chargement pubs:', err);
      allAds = [];
    }
  }

  // ============================================
  // EXTRACTION COORDONNÉES (format PostGIS)
  // ============================================
  function getLat(geo) {
    if (!geo) return 0;
    if (geo.coordinates) return geo.coordinates[1];
    if (typeof geo === 'string') return parseWKB(geo)?.lat || 0;
    return 0;
  }
  function getLng(geo) {
    if (!geo) return 0;
    if (geo.coordinates) return geo.coordinates[0];
    if (typeof geo === 'string') return parseWKB(geo)?.lng || 0;
    return 0;
  }

  // Décode le format WKB hexadécimal que PostGIS peut renvoyer (ex: "0101000020E6100000...")
  function parseWKB(hex) {
    try {
      if (!hex || hex.length < 50) return null;
      // Le format EWKB : on saute l'en-tête (endianness + type + SRID = 18 octets = 36 hex chars)
      const lngHex = hex.substring(18, 34);
      const latHex = hex.substring(34, 50);
      const lng = hexToDouble(lngHex);
      const lat = hexToDouble(latHex);
      return { lat, lng };
    } catch (e) {
      return null;
    }
  }

  function hexToDouble(hex) {
    // Convertit 8 octets hex (little-endian) en nombre flottant double précision
    const bytes = new Uint8Array(8);
    for (let i = 0; i < 8; i++) {
      bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
    }
    return new DataView(bytes.buffer).getFloat64(0, true); // true = little-endian
  }

  // ============================================
  // DISTANCE
  // ============================================
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function formatDist(km) {
    if (!km) return '';
    return km < 1 ? Math.round(km * 1000) + ' m' : km.toFixed(1) + ' km';
  }

  // ============================================
  // RENDU LISTE
  // ============================================
  function getFiltered() {
    return allTrucks.filter(t =>
      (activeFilter === 'all' || t.cuisine_type === activeFilter) &&
      (!showOpenOnly || t.is_open)
    );
  }

  function renderList() {
    const trucks = getFiltered();
    const list = document.getElementById('truck-list');
    document.getElementById('list-count').textContent = `${trucks.length} food truck${trucks.length > 1 ? 's' : ''} trouvé${trucks.length > 1 ? 's' : ''}`;

    // Encart pub sponsorisé en haut de liste (une seule, prioritairement locale puis générale)
    const featuredAd = allAds.find(a => a.ad_type === 'local') || allAds.find(a => a.ad_type === 'general');
    const adHtml = featuredAd ? renderAdCard(featuredAd) : '';

    if (!trucks.length) {
      list.innerHTML = adHtml + '<div class="empty-state"><div class="big">🔍</div><p>Aucun truck dans cette zone.<br>Élargissez le rayon ou changez de filtre.</p></div>';
      return;
    }

    const trucksHtml = trucks.map(t => {
      const emoji = CUISINE_EMOJI[t.cuisine_type] || '🍽️';
      const isPro = t.plan === 'pro';
      const stars = t.average_rating ? '★'.repeat(Math.round(t.average_rating)) : '';
      return `
        <div class="truck-card ${selectedTruck?.id === t.id ? 'selected' : ''} ${isPro ? 'pro-card' : ''}"
             onclick="selectTruck('${t.id}')">
          <div class="truck-emoji">${emoji}</div>
          <div class="truck-info">
            <div class="truck-top">
              <span class="truck-name">${t.name}</span>
              <span class="badge ${t.is_open ? 'badge-open' : 'badge-closed'}">${t.is_open ? 'Ouvert' : 'Fermé'}</span>
            </div>
            <div class="truck-cuisine">${t.cuisine_type || 'Cuisine variée'} ${isPro ? '<span class="badge badge-pro">PRO</span>' : ''}</div>
            <div class="truck-meta">
              ${t.dist ? `<span class="meta-item">📍 ${formatDist(t.dist)}</span>` : ''}
              ${stars ? `<span class="meta-item stars">${stars} ${t.average_rating}</span>` : ''}
              ${t.city ? `<span class="meta-item">🏙️ ${t.city}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    list.innerHTML = adHtml + trucksHtml;
  }

  // ============================================
  // CARTE PUBLICITAIRE (sponsorisée)
  // ============================================
  function renderAdCard(ad) {
    const emoji = BUSINESS_EMOJI[ad.business_type] || '📣';
    return `
      <div class="ad-card" onclick="handleAdClick('${ad.id}', '${ad.cta_link || ''}')">
        <div class="ad-icon">${emoji}</div>
        <div class="ad-info">
          <div class="ad-top">
            <span class="ad-name">${ad.business_name}</span>
            <span class="ad-sponsored-badge">Sponsorisé</span>
          </div>
          <div class="ad-desc">${ad.description || ''}</div>
          <div class="ad-cta">${ad.cta_text || 'En savoir plus'} →</div>
        </div>
      </div>
    `;
  }

  async function handleAdClick(adId, link) {
    // Enregistrer le clic
    try { await sb.from('ad_clicks').insert({ ad_id: adId }); } catch (e) {}
    if (link) window.open(link, '_blank');
  }

  // ============================================
  // MARQUEURS CARTE
  // ============================================
  function renderMarkers() {
    Object.values(markers).forEach(m => m.remove());
    markers = {};
    Object.values(adMarkers).forEach(m => m.remove());
    adMarkers = {};

    const trucks = getFiltered();
    trucks.forEach(t => {
      const lat = getLat(t.location);
      const lng = getLng(t.location);
      if (!lat && !lng) return;

      const isPro = t.plan === 'pro';
      const emoji = CUISINE_EMOJI[t.cuisine_type] || '🍽️';
      const icon = L.divIcon({
        className: `custom-marker ${isPro ? 'pro' : ''} ${!t.is_open ? 'closed' : ''}`,
        html: emoji,
        iconSize: isPro ? [36, 36] : [32, 32],
        iconAnchor: isPro ? [18, 18] : [16, 16]
      });

      const marker = L.marker([lat, lng], { icon }).addTo(map);
      marker.on('click', () => selectTruck(t.id));
      markers[t.id] = marker;
    });

    // Marqueurs pour les annonces locales géolocalisées
    allAds.filter(a => a.ad_type === 'local' && a.location).forEach(ad => {
      const lat = getLat(ad.location);
      const lng = getLng(ad.location);
      if (!lat && !lng) return;

      const emoji = BUSINESS_EMOJI[ad.business_type] || '📣';
      const icon = L.divIcon({
        className: 'ad-marker',
        html: emoji,
        iconSize: [30, 30],
        iconAnchor: [15, 15]
      });

      const marker = L.marker([lat, lng], { icon }).addTo(map);
      marker.on('click', () => handleAdClick(ad.id, ad.cta_link));
      adMarkers[ad.id] = marker;
    });
  }

  // ============================================
  // SÉLECTION TRUCK
  // ============================================
  function selectTruck(id) {
    selectedTruck = allTrucks.find(t => t.id === id);
    if (!selectedTruck) return;

    renderList();

    // Scroll vers la carte
    const lat = getLat(selectedTruck.location);
    const lng = getLng(selectedTruck.location);
    if (lat && lng && map) map.setView([lat, lng], 15);

    // Popup détail
    const emoji = CUISINE_EMOJI[selectedTruck.cuisine_type] || '🍽️';
    document.getElementById('popup-emoji').textContent = emoji;
    document.getElementById('popup-name').textContent = selectedTruck.name;
    document.getElementById('popup-cuisine').textContent = selectedTruck.cuisine_type || 'Cuisine variée';
    document.getElementById('popup-desc').textContent = selectedTruck.description || '';
    document.getElementById('popup-dist').textContent = selectedTruck.dist ? '📍 ' + formatDist(selectedTruck.dist) + ' de vous' : '';
    document.getElementById('popup-city').textContent = selectedTruck.city ? '🏙️ ' + selectedTruck.city : '';
    document.getElementById('popup-hours').textContent = selectedTruck.is_open ? '🟢 Ouvert maintenant' : '🔴 Fermé';
    document.getElementById('popup-event-btn').onclick = () => {
      window.location.href = `evenement.html?truck=${selectedTruck.id}`;
    };
    document.getElementById('truck-popup').classList.add('show');

    // Points fidélité
    if (window.addPoints) window.addPoints('profile_view', id);
  }

  function closePopup() {
    document.getElementById('truck-popup').classList.remove('show');
    selectedTruck = null;
    renderList();
  }

  // ============================================
  // FILTRES
  // ============================================
  function setFilter(el) {
    document.querySelectorAll('.filter-chip:not(.open-only)').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.cat;
    renderList();
    renderMarkers();
  }

  function toggleOpen(el) {
    showOpenOnly = !showOpenOnly;
    el.classList.toggle('active', showOpenOnly);
    renderList();
    renderMarkers();
  }

  function updateRadius(val) {
    radius = parseInt(val);
    document.getElementById('radius-label').textContent = radius + ' km';
    if (radiusCircle) radiusCircle.setRadius(radius * 1000);
    if (userLat) loadTrucks();
  }

  // ============================================
  // POINTS FIDÉLITÉ AUTO
  // ============================================
  async function trackProfileViews() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
  }

  // ============================================
  // INIT
  // ============================================
  initMap(46.8534, 2.3488); // Centre France par défaut
  locateUser();
</script>
